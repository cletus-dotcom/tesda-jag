<div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-tesda text-white">
                <h5 class="modal-title" id="changePasswordModalLabel">Change Password</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="changePasswordForm">
                <div class="modal-body">
                    <p class="text-muted small mb-3">Update the password for your account (<strong>{{ session.get('username', '') }}</strong>).</p>
                    <div class="mb-3">
                        <label for="currentPassword" class="form-label">Current password</label>
                        <input type="password" class="form-control" id="currentPassword" name="current_password" required autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New password</label>
                        <input type="password" class="form-control" id="newPassword" name="new_password" required autocomplete="new-password" minlength="6">
                    </div>
                    <div class="mb-0">
                        <label for="confirmPassword" class="form-label">Confirm new password</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirm_password" required autocomplete="new-password" minlength="6">
                    </div>
                    <div id="changePasswordError" class="alert alert-danger mt-3 mb-0 d-none" role="alert"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-tesda" id="changePasswordSubmit">Save Password</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('changePasswordForm');
        const modalEl = document.getElementById('changePasswordModal');
        const errorEl = document.getElementById('changePasswordError');
        const submitBtn = document.getElementById('changePasswordSubmit');

        modalEl?.addEventListener('hidden.bs.modal', () => {
            form?.reset();
            errorEl?.classList.add('d-none');
            errorEl.textContent = '';
        });

        form?.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('d-none');
            errorEl.textContent = '';

            const payload = {
                current_password: document.getElementById('currentPassword').value.trim(),
                new_password: document.getElementById('newPassword').value.trim(),
                confirm_password: document.getElementById('confirmPassword').value.trim(),
            };

            submitBtn.disabled = true;
            try {
                const res = await fetch('{{ url_for("main_routes.change_password") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (data.status === 'success') {
                    bootstrap.Modal.getInstance(modalEl).hide();
                    alert(data.msg);
                    return;
                }
                errorEl.textContent = data.msg || 'Unable to change password.';
                errorEl.classList.remove('d-none');
            } catch (err) {
                errorEl.textContent = err.message || 'Network error.';
                errorEl.classList.remove('d-none');
            } finally {
                submitBtn.disabled = false;
            }
        });
    });
</script>
